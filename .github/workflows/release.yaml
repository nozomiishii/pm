name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

# 同時実行を防止し、release-pr が未完了のリリースを参照する競合を回避する
concurrency:
  group: release
  cancel-in-progress: false

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

jobs:
  # release PR がマージされていれば draft release + tag を作成
  create-draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required by release-please to create git tags and draft GitHub releases
      issues: write # kept to match release-please's documented permission set (avoids divergence-debugging later)
      pull-requests: write # required by release-please to open and update the release PR

    outputs:
      release_created: ${{ steps.detect.outputs.release_created }}
      tag_name: ${{ steps.detect.outputs.tag_name }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.1"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write # kept to match release-please's documented permission set (avoids divergence-debugging later)
          permission-pull-requests: write
          # GitHub requires workflows:write to create a release/tag on a commit that is
          # not the current branch head. release-please tags the (already-merged, now
          # non-head) release commit, so without this the create-release call returns
          # 403 "Resource not accessible by integration".
          permission-workflows: write

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release-please github-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          pnpm exec release-please github-release \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"

      - name: Detect created release
        id: detect
        run: |
          VERSION=$(jq -r '."."' .github/.release-please-manifest.json)
          TAG_NAME="v${VERSION}"
          if gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q 'true'; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  build-and-release:
    needs: create-draft-release
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # required by gh release upload to attach built binaries to the GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.7.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build binaries
        run: pnpm run build:exe

      - name: Rename binaries
        run: |
          mv dist/cli-darwin-x64 dist/pm-darwin-x64
          mv dist/cli-darwin-arm64 dist/pm-darwin-arm64
          mv dist/cli-linux-x64 dist/pm-linux-x64
          mv dist/cli-linux-arm64 dist/pm-linux-arm64

      - name: Copy release assets
        run: |
          cp src/pm.zsh dist/pm.zsh
          cp src/logo/logo-color.ascii dist/logo-color.ascii

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/*

  npm-publish:
    needs: create-draft-release
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # required by actions/checkout to fetch the tagged release commit
      id-token: write # required by npm publish to mint an OIDC token for provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        run: pnpm publish --no-git-checks

  # draft release を publish。
  # npm publish とバイナリアップロードが両方失敗したのに GitHub release だけ確定するのを防ぐため、
  # npm-publish と build-and-release の両方が成功した後に実行する
  publish-release:
    needs: [create-draft-release, npm-publish, build-and-release]
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required by gh release edit to publish the draft release

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: gh release edit "${TAG_NAME}" --draft=false

  release-pr:
    needs: [create-draft-release, npm-publish, build-and-release, publish-release]
    if: ${{ always() && !cancelled() && needs.npm-publish.result != 'failure' && needs.publish-release.result != 'failure' && needs.build-and-release.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required by release-please to push release PR branches
      pull-requests: write # required by release-please to open and update the release PR

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.1"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release-please release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          pnpm exec release-please release-pr \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"
