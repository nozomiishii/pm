name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: release
  cancel-in-progress: false

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: write # required by release-please-action to create release commits, tags, and GitHub Releases
      issues: write # kept to match release-please's documented permission set (avoids divergence-debugging later)
      pull-requests: write # required by release-please-action to open and update the release PR

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.35.0"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write # kept to match release-please's documented permission set (avoids divergence-debugging later)
          permission-pull-requests: write
          # GitHub requires workflows:write to create a release/tag on a commit that is
          # not the current branch head. release-please tags the (already-merged, now
          # non-head) release commit, so without this the create-release call returns
          # 403 "Resource not accessible by integration".
          permission-workflows: write

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/.release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  build-and-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # required by gh release upload to attach built binaries to the GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Pin to the released tag, not the run's trigger commit: with rapid merges the
          # release-creating run may predate the version bump and publish a stale version.
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "25.7.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build binaries
        run: pnpm run build:exe

      - name: Rename binaries
        run: |
          mv build/cli-darwin-x64 build/pm-darwin-x64
          mv build/cli-darwin-arm64 build/pm-darwin-arm64
          mv build/cli-linux-x64 build/pm-linux-x64
          mv build/cli-linux-arm64 build/pm-linux-arm64

      - name: Copy release assets
        run: |
          cp src/pm.zsh build/pm.zsh
          cp src/logo/logo-color.ascii build/logo-color.ascii

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" build/*

  npm-publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # required by actions/checkout to fetch repository code
      id-token: write # required by npm publish for OIDC-based trusted publishing to the npm registry

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Pin to the released tag, not the run's trigger commit: with rapid merges the
          # release-creating run may predate the version bump and publish a stale version.
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        run: pnpm publish --no-git-checks
